<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricenric Homepage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#070a13] text-slate-200 min-h-screen flex flex-col justify-between p-8 overflow-hidden select-none">

    <header class="flex justify-between items-center w-full max-w-7xl mx-auto border-b border-slate-900 pb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-cyan-500/20">
                EC
            </div>
            <span class="font-semibold tracking-wide text-slate-300">Ricenric Homepage</span>
        </div>
        <div class="text-sm font-medium tracking-wider text-slate-400" id="console-clock">
            10:45 AM
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto my-auto py-12 flex flex-col justify-center">
        <!-- <h1 class="text-xs uppercase font-extrabold tracking-[0.25em] text-cyan-500 mb-6 px-2">Applications</h1> -->
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 w-full items-end">


            <div class="relative w-full max-w-sm mx-auto group flex flex-col gap-4">
                <div class="relative w-full h-56 bg-slate-900/80 rounded-2xl border-2 border-slate-800/80 
                            transition-all duration-300 ease-out 
                            group-hover:border-cyan-500/30 group-hover:bg-slate-900/90 overflow-visible">
                    
                    <img src="/assets/hotori_nte_application.png" 
                        alt="Hotori" 
                        class="absolute bottom-0 left-1/2 -translate-x-1/2 h-auto w-[540px] max-w-none object-contain pointer-events-none
                                origin-bottom transition-all duration-300 ease-out 
                                group-hover:scale-[1.05] group-hover:filter group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                </div>

                <div class="text-center select-none pointer-events-none">
                    <h2 class="text-xl font-bold tracking-wide text-slate-300 group-hover:text-cyan-400 transition-colors">
                        NTE Checklist
                    </h2>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-0.5">
                        Neverness to Everness
                    </p>
                </div>
            </div>

            <div class="relative w-full max-w-sm mx-auto group flex flex-col gap-4">
    
                <div class="relative w-full h-56 bg-slate-900/80 rounded-2xl border-2 border-slate-800/80 
                            transition-all duration-300 ease-out 
                            group-hover:border-cyan-500/30 group-hover:bg-slate-900/90 overflow-visible">
                    
                    <img src="/assets/placeholder.png" 
                        alt="" 
                        class="absolute bottom-0 left-1/2 -translate-x-1/2 h-auto w-[540px] max-w-none object-contain pointer-events-none
                                origin-bottom transition-all duration-300 ease-out 
                                group-hover:scale-[1.05] group-hover:filter group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                </div>

                <div class="text-center select-none pointer-events-none">
                    <h2 class="text-xl font-bold tracking-wide text-slate-300 group-hover:text-cyan-400 transition-colors">
                        NTE Checklist
                    </h2>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-0.5">
                        Beyond The Rails V1.2
                    </p>
                </div>

            </div>

            <a href="#" class="group flex flex-col gap-3 focus:outline-none">
                <div class="relative aspect-[16/10] w-full rounded-2xl border-2 border-dashed border-slate-800 bg-slate-900/30 flex flex-col items-center justify-center gap-3 text-slate-500 transition-all duration-300 ease-out hover:border-slate-500 hover:text-slate-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <div class="px-2 opacity-50">
                    <h2 class="text-xl font-bold tracking-wide text-slate-400">New Project</h2>
                    <p class="text-xs text-slate-600 mt-0.5">Add to Grid</p>
                </div>
            </a>

        </div>
    </main>

    <footer class="w-full max-w-7xl mx-auto border-t border-slate-900 pt-4 flex items-center justify-between text-xs font-semibold text-slate-500 tracking-wider uppercase">
        <div class="flex gap-6">
            <div class="flex items-center gap-1.5">
                <span class="w-5 h-5 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-[10px] font-bold border border-slate-700">A</span>
                <span>Select</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="w-5 h-5 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-[10px] font-bold border border-slate-700">X</span>
                <span>Options</span>
            </div>
        </div>
        <div>
            <span>System OS v1.0.0</span>
        </div>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // Handle midnight/noon
            document.getElementById('console-clock').textContent = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
