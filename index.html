<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ericOS Homepage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body class="bg-slate-950 transition-colors text-slate-200 min-h-screen flex flex-col justify-between p-8 px-2 overflow-hidden select-none relative">
    
    <canvas id="petal-canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

    <header class="relative z-10 flex justify-between items-center w-full max-w-7xl mx-auto border-b border-slate-700 pb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-cyan-500/20">
                EC
            </div>
            <span class="font-semibold tracking-wide text-slate-300">Ricenric</span>
        </div>
        <div class="text-sm font-medium tracking-wider text-slate-400" id="console-clock">10:45 AM</div>
        <!-- <button id="theme-toggle" class="p-2 bg-slate-700 rounded-full">
            Toggle Mode
        </button> -->
    </header>

    <main class="relative z-10 w-full max-w-7xl mx-auto my-auto py-12 flex flex-col justify-center gap-6">

        <div class="flex items-center gap-4">

            <button id="prev-btn" aria-label="Previous"
                class="flex-shrink-0 mr-4 w-10 h-10 rounded-full bg-slate-900 border border-slate-800
                       flex items-center justify-center text-slate-500 text-xl leading-none
                       transition-all hover:border-cyan-500/50 hover:text-cyan-400
                       disabled:opacity-20 disabled:cursor-default" border border-slate-700>
                ‹
            </button>

            <!-- Viewport clips the sliding track -->
            <div class="overflow-hidden p-4 -m-4">
                <div id="carousel-track"
                     class="flex gap-10 items-end"
                     style="transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);">

                     <!-- 
                        =========================================
                        Card template: every card is w-64 with a fixed-height card-box
                        Image template: w: image width, size control
                                        bottom: vertical anchoring, -bottom-x to push down
                                        left-[x%] to push it left or right, left-0 is left edge and right-0 is right edge etc
                        =========================================
                    -->

                    <a href="/nte-checklist" data-card
                       class="carousel-card active animate-slide-up [animation-delay:0ms] opacity-0
                              flex-shrink-0 w-96 flex flex-col gap-4 cursor-pointer group
                              rounded-2xl">
                        <div class="card-box relative w-full h-[395px] bg-slate-900/80 border border-slate-800/80 rounded-2xl overflow-visible transition-all duration-300 ease-out group-hover:bg-slate-900/90">
                            <img src="/assets/hotori_nte_application.png"
                                 alt="Hotori"
                                 class="absolute bottom-0 left-1/2 -translate-x-1/2 h-auto w-[600px] max-w-none
                                        object-contain pointer-events-none origin-bottom
                                        transition-all duration-300 ease-out z-20
                                        group-hover:scale-[1.04] group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                        </div>
                        <div class="text-center pointer-events-none pb-2">
                            <h2 class="card-title text-xl font-bold tracking-wide text-slate-300 transition-colors">NTE Checklist</h2>
                            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-1">Neverness to Everness</p>
                        </div>
                    </a>

                    <a href="#" data-card
                       class="carousel-card animate-slide-up [animation-delay:200ms] opacity-0
                              flex-shrink-0 w-96 flex flex-col gap-4 cursor-pointer group
                              rounded-2xl">
                        <div class="card-box relative w-full h-[395px] bg-slate-900/80 border border-slate-800/80 rounded-2xl
                                    overflow-visible transition-all duration-300 ease-out
                                    group-hover:bg-slate-900/90">
                            <img src="/assets/jingliu_placeholder.webp"
                                 alt=""
                                 class="absolute -bottom-8 left-[60%] -translate-x-1/2 h-auto w-[450px] max-w-none
                                        object-contain pointer-events-none origin-bottom
                                        transition-all duration-300 ease-out
                                        group-hover:scale-[1.05] group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                        </div>
                        <div class="text-center pointer-events-none pb-2">
                            <h2 class="card-title text-xl font-bold tracking-wide text-slate-300 transition-colors">Honkai Star Rail App</h2>
                            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-1">Honkai Star Rail</p>
                        </div>
                    </a>

                    <a href="#" data-card
                       class="carousel-card animate-slide-up [animation-delay:400ms] opacity-0
                              flex-shrink-0 w-96 flex flex-col gap-4 cursor-pointer group
                              rounded-2xl">
                        <div class="card-box relative w-full h-[395px] bg-slate-900/80 border border-slate-800/80 rounded-2xl
                                    overflow-visible transition-all duration-300 ease-out
                                    group-hover:bg-slate-900/90">
                            <img src="/assets/ayaka_placeholder.webp"
                                 alt=""
                                 class="absolute bottom-0 left-1/2 -translate-x-1/2 h-auto w-[680px] max-w-none
                                        object-contain pointer-events-none origin-bottom
                                        transition-all duration-300 ease-out
                                        group-hover:scale-[1.05] group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                        </div>
                        <div class="text-center pointer-events-none pb-2">
                            <h2 class="card-title text-xl font-bold tracking-wide text-slate-300 transition-colors">Genshin Impact App</h2>
                            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-1">Genshin Impact</p>
                        </div>
                    </a>

                    <a href="#" data-card
                       class="carousel-card animate-slide-up [animation-delay:600ms] opacity-0
                              flex-shrink-0 w-96 flex flex-col gap-4 cursor-pointer group
                              rounded-2xl">
                        <div class="card-box relative w-full h-[395px] bg-slate-900/80 border border-slate-800/80 rounded-2xl
                                    overflow-visible transition-all duration-300 ease-out
                                    group-hover:bg-slate-900/90">
                            <img src="/assets/yinlin_placeholder.png"
                                 alt=""
                                 class="absolute bottom-0 left-1/2 -translate-x-1/2 h-auto w-[400px] max-w-none
                                        object-contain pointer-events-none origin-bottom
                                        transition-all duration-300 ease-out
                                        group-hover:scale-[1.05] group-hover:drop-shadow-[0_0_25px_rgba(34,211,238,0.4)]" />
                        </div>
                        <div class="text-center pointer-events-none pb-2">
                            <h2 class="card-title text-xl font-bold tracking-wide text-slate-300 transition-colors">Wuthering Waves App</h2>
                            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mt-1">Wuthering Waves</p>
                        </div>
                    </a>

                    <!-- New Project card -->
                    <a href="#" data-card
                       class="carousel-card animate-slide-up [animation-delay:800ms] opacity-0
                              flex-shrink-0 w-96 flex flex-col gap-4 cursor-pointer group
                              rounded-2xl">
                        <div class="card-box relative w-full h-[395px] rounded-2xl border-2 border-dashed border-slate-800
                                    bg-slate-900/30 flex flex-col items-center justify-center gap-3
                                    text-slate-500 transition-all duration-300 ease-out
                                    group-hover:border-slate-600 group-hover:text-slate-300">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                        </div>
                        <div class="text-center pointer-events-none pb-2 opacity-50">
                            <h2 class="card-title text-xl font-bold tracking-wide text-slate-400 transition-colors">New Project</h2>
                            <p class="text-[10px] uppercase tracking-widest text-slate-600 font-semibold mt-1">Add to Grid</p>
                        </div>
                    </a>

                </div>
            </div>

            <button id="next-btn" aria-label="Next"
                class="flex-shrink-0 ml-6 w-10 h-10 rounded-full bg-slate-900 border border-slate-800
                       flex items-center justify-center text-slate-500 text-xl leading-none
                       transition-all hover:border-cyan-500/50 hover:text-cyan-400
                       disabled:opacity-20 disabled:cursor-default" border border-slate-700>
                ›
            </button>
        </div>

        <!-- Dot indicators -->
        <div id="dots" class="flex gap-2 justify-center"></div>

    </main>

    <footer class="relative z-10 w-full max-w-7xl mx-auto border-t border-slate-700 pt-4 flex items-center justify-between text-xs font-semibold text-slate-500 tracking-wider uppercase">
        <div class="flex gap-6">
            <div class="flex items-center gap-1.5">
                <span class="w-5 h-5 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-[10px] font-bold border border-slate-700">A</span>
                <span>Select</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="w-5 h-5 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-[10px] font-bold border border-slate-700">B</span>
                <span>Back</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="w-5 h-5 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-[10px] font-bold border border-slate-700">X</span>
                <span>Options</span>
            </div>
        </div>
        <div><span>ericOS v1.0.0</span></div>
    </footer>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/carousel.js"></script>
    <script type="module" src="/js/petals.js"></script>
</body>
</html>
